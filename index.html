<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>医療機関別 個室・医師数比較</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: "Helvetica Neue", Arial, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 15px; }
        
        /* フィルターエリア */
        .filter-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 25px; background: #eef2f3; padding: 20px; border-radius: 8px; }
        .filter-group label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        select { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }

        /* テーブルエリア */
        .table-wrapper { overflow-x: auto; margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; min-width: 150px; }
        th { background-color: #3498db; color: white; position: sticky; left: 0; z-index: 1; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .item-name { font-weight: bold; background: #f1f3f4; width: 200px; }
        
        /* グラフエリア */
        .chart-container { position: relative; height: 350px; margin-top: 20px; padding-top: 20px; border-top: 2px solid #eee; }

        .btn-clear { display: block; margin: 10px 0 0 auto; padding: 8px 15px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h1>医療機関 設備・医師数比較ツール</h1>

    <div class="filter-section">
        <div class="filter-group">
            <label>都道府県</label>
            <select id="prefSelect"><option value="">選択してください</option></select>
        </div>
        <div class="filter-group">
            <label>一般病床規模</label>
            <select id="scaleSelect"><option value="">都道府県を先に選択</option></select>
        </div>
        <div class="filter-group">
            <label>医療機関名</label>
            <select id="hospitalSelect"><option value="">規模を先に選択</option></select>
        </div>
    </div>

    <button class="btn-clear" onclick="clearSelection()">選択解除</button>
    
    <div class="table-wrapper" id="comparisonTable"></div>

    <div class="chart-container">
        <canvas id="doctorChart"></canvas>
    </div>
</div>

<script>
    let masterData = [];
    let selectedHospitals = [];
    let myChart = null;

    // 都道府県の標準並び順定義
    const prefOrder = [
        "北海道", "青森県", "岩手県", "宮城県", "秋田県", "山形県", "福島県",
        "茨城県", "栃木県", "群馬県", "埼玉県", "千葉県", "東京都", "神奈川県",
        "新潟県", "富山県", "石川県", "福井県", "山梨県", "長野県", "岐阜県",
        "静岡県", "愛知県", "三重県", "滋賀県", "京都府", "大阪府", "兵庫県",
        "奈良県", "和歌山県", "鳥取県", "島根県", "岡山県", "広島県", "山口県",
        "徳島県", "香川県", "愛媛県", "高知県", "福岡県", "佐賀県", "長崎県",
        "熊本県", "大分県", "宮崎県", "鹿児島県", "沖縄県"
    ];

    // JSONデータの読み込み
    async function loadData() {
        try {
            const response = await fetch('koshitu.json');
            masterData = await response.json();
            initFilters();
        } catch (e) {
            console.error("データの読み込みに失敗しました:", e);
            alert("koshitu.jsonが見つかりません。同じフォルダに配置してください。");
        }
    }

    function initFilters() {
        const prefSelect = document.getElementById('prefSelect');
        
        // データ内に存在する都道府県を抽出
        let availablePrefs = [...new Set(masterData.map(d => d.結合都道府県名))];
        
        // prefOrderに基づいてソート
        availablePrefs.sort((a, b) => {
            return prefOrder.indexOf(a) - prefOrder.indexOf(b);
        });

        availablePrefs.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p;
            // 表示のみ「01北海道」形式にする
            const code = (prefOrder.indexOf(p) + 1).toString().padStart(2, '0');
            opt.textContent = `${code}${p}`;
            prefSelect.appendChild(opt);
        });

        prefSelect.addEventListener('change', updateScaleSelect);
        document.getElementById('scaleSelect').addEventListener('change', updateHospitalSelect);
        document.getElementById('hospitalSelect').addEventListener('change', addHospital);
    }

    function updateScaleSelect() {
        const pref = document.getElementById('prefSelect').value;
        const scaleSelect = document.getElementById('scaleSelect');
        scaleSelect.innerHTML = '<option value="">選択してください</option>';
        
        if (!pref) return;

        const scaleOrder = [
            "一般病床100床未満",
            "一般病床100～300床未満",
            "一般病床300～500床未満",
            "一般病床500床以上",
            "その他"
        ];

        let scales = [...new Set(masterData.filter(d => d.結合都道府県名 === pref).map(d => d.一般病床規模))];
        
        scales.sort((a, b) => {
            let indexA = scaleOrder.indexOf(a);
            let indexB = scaleOrder.indexOf(b);
            if (indexA === -1) indexA = 99;
            if (indexB === -1) indexB = 99;
            return indexA - indexB;
        });

        scales.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s; opt.textContent = s;
            scaleSelect.appendChild(opt);
        });
    }

    function updateHospitalSelect() {
        const pref = document.getElementById('prefSelect').value;
        const scale = document.getElementById('scaleSelect').value;
        const hospitalSelect = document.getElementById('hospitalSelect');
        hospitalSelect.innerHTML = '<option value="">選択してください</option>';

        if (!pref || !scale) return;
        const hospitals = masterData.filter(d => d.結合都道府県名 === pref && d.一般病床規模 === scale);
        hospitals.forEach(h => {
            const opt = document.createElement('option');
            opt.value = h.結合医療機関名称; opt.textContent = h.結合医療機関名称;
            hospitalSelect.appendChild(opt);
        });
    }

    function addHospital() {
        const name = document.getElementById('hospitalSelect').value;
        if (!name) return;
        
        const hospital = masterData.find(d => d.結合医療機関名称 === name);
        if (hospital && !selectedHospitals.some(h => h.結合医療機関名称 === name)) {
            if (selectedHospitals.length >= 10) {
                alert("比較できるのは10件までです。");
                return;
            }
            selectedHospitals.push(hospital);
            renderAll();
        }
    }

    function renderAll() {
        updateChart();
        updateTable();
    }

    function updateChart() {
        const ctx = document.getElementById('doctorChart').getContext('2d');
        if (myChart) myChart.destroy();

        if (selectedHospitals.length === 0) return;

        const labels = selectedHospitals.map(h => h.結合医療機関名称);
        const fullTime = selectedHospitals.map(h => parseFloat(h["結合常勤（医）"]) || 0);
        const partTime = selectedHospitals.map(h => parseFloat(h["結合非常勤（医）"]) || 0);

        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    { 
                        label: '常勤医師数', 
                        data: fullTime, 
                        backgroundColor: '#3498db'
                    },
                    { 
                        label: '非常勤医師数', 
                        data: partTime, 
                        backgroundColor: '#ff9f43'
                    }
                ]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                scales: { 
                    x: { 
                        beginAtZero: true, 
                        title: { display: true, text: '人数' } 
                    } 
                },
                plugins: {
                    legend: {
                        position: 'top',
                    }
                }
            }
        });
    }

    function updateTable() {
        const wrapper = document.getElementById('comparisonTable');
        if (selectedHospitals.length === 0) {
            wrapper.innerHTML = "";
            return;
        }

        const keys = Object.keys(masterData[0]);
        let html = '<table><thead><tr><th>項目</th>';
        
        selectedHospitals.forEach(h => {
            html += `<th>${h.結合医療機関名称}</th>`;
        });
        html += '</tr></thead><tbody>';

        keys.forEach(key => {
            // タイトル「統合一般病床数」を「一般病床数(床)」に変更
            let displayTitle = key;
            if (key === "統合一般病床数") {
                displayTitle = "一般病床数(床)";
            }

            html += `<tr><td class="item-name">${displayTitle}</td>`;
            selectedHospitals.forEach(h => {
                html += `<td>${h[key] || '-'}</td>`;
            });
            html += '</tr>';
        });

        html += '</tbody></table>';
        wrapper.innerHTML = html;
    }

    function clearSelection() {
        selectedHospitals = [];
        renderAll();
    }

    window.onload = loadData;
</script>

</body>
</html>
